<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Кубики DnD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/app.css">
</head>
<body>
    <div class="bg-layer" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
        <div id="spark-field"></div>
    </div>

    <main class="app-shell">
        <header class="panel top-panel reveal">
            <div>
                <p class="eyebrow">Бросок кубиков DnD</p>
                <h1>Кубики приключения</h1>
            </div>
            <div class="kbd-hints">
                <span><kbd>Space</kbd> Бросить</span>
                <span><kbd>R</kbd> Сброс</span>
            </div>
        </header>

        <section class="panel reveal" style="--delay: 80ms;">
            <div class="section-head">
                <h2>Набор кубов</h2>
                <p>Нажимай <strong>+</strong> и <strong>-</strong>, чтобы выбрать количество.</p>
            </div>
            <div id="dice-grid" class="dice-grid"></div>
        </section>

        <section class="panel result-panel reveal" style="--delay: 160ms;">
            <p id="status" class="status" aria-live="polite">Выбери кубики и бросай.</p>
            <div class="result-core">
                <span class="result-label">Итог</span>
                <div id="total" class="total" aria-live="polite">0</div>
            </div>
            <div id="summary" class="summary">Кубиков выбрано: 0</div>
            <div id="log" class="log" aria-live="polite"></div>
        </section>

        <footer class="action-row reveal" style="--delay: 240ms;">
            <button id="reset-btn" class="btn btn-reset" type="button">Сброс</button>
            <button id="roll-btn" class="btn btn-roll" type="button">Бросить кубики</button>
        </footer>
    </main>

    <script src="./js/DiceEngine.js"></script>
    <script src="./js/App.js"></script>
</body>
</html>
