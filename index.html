<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DnD Dice WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #controls { position: absolute; top: 10px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; z-index: 100; }
        .btn { background: #2f2f2f; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-roll { background: #e91e63; border: none; font-weight: bold; }
        #result-overlay { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .total-sum { font-size: 3rem; display: block; }
    </style>
</head>
<body>

    <div id="controls">
        <button class="btn" onclick="diceApp.addDice('d4')">D4</button>
        <button class="btn" onclick="diceApp.addDice('d6')">D6</button>
        <button class="btn" onclick="diceApp.addDice('d8') Add D8">D8</button>
        <button class="btn" onclick="diceApp.addDice('d12')">D12</button>
        <button class="btn" onclick="diceApp.addDice('d20')">D20</button>
        <button class="btn btn-roll" onclick="diceApp.rollAll()">ROLL</button>
        <button class="btn" onclick="diceApp.clear()">Reset</button>
    </div>

    <div id="result-overlay">
        <span id="dice-list"></span>
        <span class="total-sum" id="total-sum">0</span>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
        import * as CANNON from 'https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';

        /**
         * Core class for the DnD Dice Roller Application.
         * Handles 3D rendering, physics, and Telegram integration.
         */
        class DiceApp {
            constructor() {
                this.tg = window.Telegram.WebApp;
                this.dice = [];
                this.initGraphics();
                this.initPhysics();
                this.animate();
                
                this.tg.expand(); // Fullscreen
                this.tg.ready();
            }

            /**
             * Initializes the Three.js scene, camera, and lighting.
             */
            initGraphics() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 15, 0);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setClearColor(0x121212);
                document.body.appendChild(this.renderer.domElement);

                const light = new THREE.DirectionalLight(0xffffff, 1.5);
                light.position.set(5, 10, 5);
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                this.scene.add(light);
            }

            /**
             * Initializes the Cannon-es physics world.
             */
            initPhysics() {
                this.world = new CANNON.World({ gravity: new CANNON.Vec3(0, -20, 0) });
                
                // Static floor
                const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
                groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
                this.world.addBody(groundBody);
            }

            /**
             * Adds a specific die to the scene.
             * @param {string} type - The type of die (e.g., 'd6', 'd20')
             */
            addDice(type) {
                let geometry;
                let shape;
                const size = 1.2;

                switch(type) {
                    case 'd20': 
                        geometry = new THREE.IcosahedronGeometry(size); 
                        shape = new CANNON.Sphere(size); // Simplified collision for demo
                        break;
                    default: 
                        geometry = new THREE.BoxGeometry(size, size, size);
                        shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
                }

                const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
                const body = new CANNON.Body({ mass: 1, shape: shape });
                
                body.position.set(Math.random() * 2 - 1, 5 + this.dice.length, Math.random() * 2 - 1);
                
                this.scene.add(mesh);
                this.world.addBody(body);
                this.dice.push({ mesh, body, type });
            }

            /**
             * Applies physical impulses to all dice.
             */
            rollAll() {
                this.dice.forEach(d => {
                    d.body.velocity.set(0, 10, 0);
                    d.body.angularVelocity.set(Math.random() * 20, Math.random() * 20, Math.random() * 20);
                });

                // Simple simulated result after 2 seconds
                setTimeout(() => this.calculateResult(), 1500);
            }

            calculateResult() {
                let total = 0;
                this.dice.forEach(d => {
                    // In a real app, calculate based on face normal. Here we use random.
                    const val = Math.floor(Math.random() * parseInt(d.type.substring(1))) + 1;
                    total += val;
                });
                document.getElementById('total-sum').innerText = total;
                this.saveToCloud(total);
            }

            /**
             * Clears the scene.
             */
            clear() {
                this.dice.forEach(d => {
                    this.scene.remove(d.mesh);
                    this.world.removeBody(d.body);
                });
                this.dice = [];
                document.getElementById('total-sum').innerText = "0";
            }

            /**
             * Saves the roll result to Telegram Cloud Storage.
             * @param {number} sum 
             */
            saveToCloud(sum) {
                if(this.tg.CloudStorage) {
                    this.tg.CloudStorage.setItem('last_roll', sum.toString());
                }
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.world.fixedStep();
                this.dice.forEach(d => {
                    d.mesh.position.copy(d.body.position);
                    d.mesh.quaternion.copy(d.body.quaternion);
                });
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.diceApp = new DiceApp();
    </script>
</body>
</html>
