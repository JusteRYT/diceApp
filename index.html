<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Dice Roller</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        #result { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 2rem; font-weight: bold; }
        button { background: #5865F2; border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="addDice('d20')">Add D20</button>
        <button onclick="addDice('d6')">Add D6</button>
        <button onclick="rollAll()" style="background: #eb459e;">ROLL!</button>
    </div>
    <div id="result">Сумма: 0</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
        import * as CANNON from 'https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';

        // --- Core Variables ---
        let scene, camera, renderer, world;
        let diceArray = [];
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        /**
         * Initializes the 3D physics world and Three.js scene.
         */
        function init() {
            // Physics
            world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
            
            // Scene
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Floor (Physics + Visual)
            const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
            floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(floorBody);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            
            diceArray.forEach(d => {
                d.mesh.position.copy(d.body.position);
                d.mesh.quaternion.copy(d.body.quaternion);
            });

            renderer.render(scene, camera);
        }

        /**
         * Creates a D6 (Cube) as an example.
         * For D20, use IcosahedronGeometry.
         */
        window.addDice = function(type) {
            const size = 1;
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(size, size, size),
                new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
            );
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 1,
                shape: new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2)),
                position: new CANNON.Vec3(Math.random(), 5, Math.random())
            });
            world.addBody(body);

            diceArray.push({ mesh, body, type });
        };

        window.rollAll = function() {
            diceArray.forEach(d => {
                d.body.velocity.set(0, 5, 0);
                d.body.angularVelocity.set(Math.random() * 10, Math.random() * 10, Math.random() * 10);
            });
            
            // Имитация подсчета суммы (в идеале — проверка положения грани кубика)
            setTimeout(() => {
                const total = diceArray.length * 4; // Заглушка: считаем, что выпало 4 на всех
                document.getElementById('result').innerText = `Сумма: ${total}`;
                saveResultToHistory(total);
            }, 2000);
        };

        async function saveResultToHistory(sum) {
            const data = {
                userId: tg.initDataUnsafe.user?.id,
                sum: sum,
                dice: diceArray.map(d => d.type).join(', ')
            };
            
            // Отправляем на твой Java Backend
            await fetch('https://your-api-url.com/api/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        init();
    </script>
</body>
</html>
