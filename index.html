<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Dice - Lite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff2e63; --bg: #0d0d0d; --success: #00f5d4; --fail: #ff2e63; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }
        
        #ui { height: 100vh; display: flex; flex-direction: column; }
        
        /* Верхняя панель выбора */
        #controls { padding: 15px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: rgba(255,255,255,0.05); }
        .dice-btn { background: rgba(40, 40, 40, 0.8); border: 1px solid #444; color: white; padding: 12px 0; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; position: relative; font-family: 'JetBrains Mono'; }
        .dice-btn .count { position: absolute; top: -5px; right: -5px; background: var(--primary); width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
        .dice-btn.active .count { opacity: 1; transform: scale(1.1); }

        /* Центр теперь пустой или декоративный */
        #spacer { flex-grow: 1; }

        /* Область результата переехала вниз */
        #result-area { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 20px; }
        
        #crit-msg { font-size: 1.4rem; font-weight: 900; height: 30px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .msg-success { color: var(--success); text-shadow: 0 0 15px var(--success); animation: pulse 0.5s infinite; }
        .msg-fail { color: var(--fail); text-shadow: 0 0 15px var(--fail); animation: shake 0.3s infinite; }

        #total { font-size: 7rem; font-weight: 900; line-height: 0.9; margin: 0; transition: all 0.2s; }
        #log { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; min-height: 30px; max-height: 80px; overflow-y: auto; }
        .dice-tag { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 6px; font-family: 'JetBrains Mono'; font-size: 0.8rem; border-left: 3px solid var(--primary); }

        /* Нижние кнопки */
        #actions { padding: 10px 25px 40px; display: flex; gap: 15px; }
        .btn { padding: 20px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-reset { background: #222; color: #777; width: 30%; }
        .btn-roll { background: var(--primary); color: white; flex-grow: 1; box-shadow: 0 0 30px rgba(255, 46, 99, 0.2); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="ui">
        <div id="controls">
            <button class="dice-btn" onclick="app.add('d4')">D4<div class="count">0</div></button>
            <button class="dice-btn" onclick="app.add('d6')">D6<div class="count">0</div></button>
            <button class="dice-btn" onclick="app.add('d8')">D8<div class="count">0</div></button>
            <button class="dice-btn" onclick="app.add('d10')">D10<div class="count">0</div></button>
            <button class="dice-btn" onclick="app.add('d12')">D12<div class="count">0</div></button>
            <button class="dice-btn" onclick="app.add('d20')">D20<div class="count">0</div></button>
            <button class="dice-btn" onclick="app.add('d100')">D100<div class="count">0</div></button>
        </div>

        <div id="spacer"></div>

        <div id="result-area">
            <div id="crit-msg"></div>
            <div id="total">0</div>
            <div id="log"></div>
        </div>

        <div id="actions">
            <button class="btn btn-reset" onclick="app.reset()">Reset</button>
            <button class="btn btn-roll" onclick="app.roll()">ROLL</button>
        </div>
    </div>

    <script>
        class DiceApp {
            constructor() {
                this.selectedDice = [];
                this.counts = { d4:0, d6:0, d8:0, d10:10, d12:0, d20:0, d100:0 };
                this.isRolling = false;
            }

            add(type) {
                if (this.isRolling) return;
                this.selectedDice.push({ type, sides: parseInt(type.substring(1)) });
                this.counts[type]++;
                this.updateUI();
            }

            updateUI() {
                const buttons = document.querySelectorAll('.dice-btn');
                Object.keys(this.counts).forEach((type, idx) => {
                    const btn = buttons[idx];
                    btn.classList.toggle('active', this.counts[type] > 0);
                    btn.querySelector('.count').innerText = this.counts[type];
                });
            }

            roll() {
                if (this.selectedDice.length === 0 || this.isRolling) return;
                
                this.isRolling = true;
                const totalEl = document.getElementById('total');
                const logEl = document.getElementById('log');
                const critEl = document.getElementById('crit-msg');
                
                let counter = 0;
                const interval = setInterval(() => {
                    totalEl.innerText = Math.floor(Math.random() * 99);
                    counter++;
                    if (counter > 12) {
                        clearInterval(interval);
                        this.finalizeRoll(totalEl, logEl, critEl);
                    }
                }, 40);
            }

            finalizeRoll(totalEl, logEl, critEl) {
                let total = 0;
                let results = [];
                let hasNat20 = false;
                let hasNat1 = false;

                this.selectedDice.forEach(dice => {
                    const res = Math.floor(Math.random() * dice.sides) + 1;
                    total += res;
                    results.push({ type: dice.type, val: res });

                    if (dice.type === 'd20') {
                        if (res === 20) hasNat20 = true;
                        if (res === 1) hasNat1 = true;
                    }
                });

                logEl.innerHTML = results.map(r => `<div class="dice-tag">${r.type}:${r.val}</div>`).join('');
                totalEl.innerText = total;

                critEl.className = '';
                if (hasNat20 && hasNat1) {
                    critEl.innerText = "Chaos Reigns!";
                    critEl.classList.add('msg-success');
                } else if (hasNat20) {
                    critEl.innerText = "Critical Success!";
                    critEl.classList.add('msg-success');
                } else if (hasNat1) {
                    critEl.innerText = "Critical Failure!";
                    critEl.classList.add('msg-fail');
                } else {
                    critEl.innerText = "";
                }

                this.isRolling = false;
            }

            reset() {
                this.selectedDice = [];
                this.counts = { d4:0, d6:0, d8:0, d10:0, d12:0, d20:0, d100:0 };
                document.getElementById('total').innerText = "0";
                document.getElementById('log').innerHTML = "";
                document.getElementById('crit-msg').innerText = "";
                this.updateUI();
            }
        }

        window.app = new DiceApp();
    </script>
</body>
</html>
