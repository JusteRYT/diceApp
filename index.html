<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DnD Dice WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #121212; font-family: sans-serif; }
        #controls { position: absolute; top: 10px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; z-index: 100; }
        .btn { background: #2f2f2f; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .btn-roll { background: #e91e63; border: none; font-weight: bold; min-width: 80px; }
        #result-overlay { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; pointer-events: none;
        }
        .total-sum { font-size: 4rem; font-weight: 800; display: block; color: #e91e63; text-shadow: 0 0 20px rgba(233, 30, 99, 0.5); }
    </style>
</head>
<body>

    <div id="controls">
        <button class="btn" onclick="diceApp.addDice('d6')">+D6</button>
        <button class="btn" onclick="diceApp.addDice('d20')">+D20</button>
        <button class="btn btn-roll" onclick="diceApp.rollAll()">ROLL</button>
        <button class="btn" onclick="diceApp.clear()">Reset</button>
    </div>

    <div id="result-overlay">
        <span class="total-sum" id="total-sum">0</span>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
        import * as CANNON from 'https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';

        class DiceApp {
            constructor() {
                this.tg = window.Telegram.WebApp;
                this.dice = [];
                this.isRolling = false;
                this.initGraphics();
                this.initPhysics();
                this.animate();
                this.tg.expand();
                this.tg.ready();
            }

            initGraphics() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 18, 4); // Вид сверху под небольшим углом
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setClearColor(0x121212);
                document.body.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const light = new THREE.PointLight(0xffffff, 1.2);
                light.position.set(10, 20, 10);
                this.scene.add(light);
            }

            initPhysics() {
                this.world = new CANNON.World({ gravity: new CANNON.Vec3(0, -30, 0) });
                this.world.allowSleep = true; // Важно для оптимизации

                // ПОЛ
                const floor = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
                floor.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
                this.world.addBody(floor);

                // СТЕНЫ (чтобы кубики не улетали)
                this.addWall(0, 0, 8, Math.PI);    // Передняя
                this.addWall(0, 0, -8, 0);         // Задняя
                this.addWall(8, 0, 0, -Math.PI/2); // Правая
                this.addWall(-8, 0, 0, Math.PI/2); // Левая
            }

            addWall(x, y, z, rotationY) {
                const wall = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
                wall.position.set(x, y, z);
                wall.quaternion.setFromEuler(0, rotationY, 0);
                this.world.addBody(wall);
            }

            addDice(type) {
                const size = 1.5;
                let geometry, shape;

                if (type === 'd20') {
                    geometry = new THREE.IcosahedronGeometry(size);
                    shape = new CANNON.Sphere(size); // Сфера для d20 катится лучше
                } else {
                    geometry = new THREE.BoxGeometry(size, size, size);
                    shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
                }

                const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color(`hsl(${Math.random() * 360}, 70%, 50%)`),
                    flatShading: true 
                }));
                
                const body = new CANNON.Body({ mass: 1, shape: shape });
                body.position.set(Math.random() * 4 - 2, 8, Math.random() * 4 - 2);
                
                // Добавляем немного случайного вращения при спавне
                body.quaternion.setFromEuler(Math.random(), Math.random(), Math.random());

                this.scene.add(mesh);
                this.world.addBody(body);
                this.dice.push({ mesh, body, type });
            }

            rollAll() {
                if (this.isRolling) return;
                this.isRolling = true;
                
                this.dice.forEach(d => {
                    d.body.wakeUp();
                    d.body.position.y += 2; 
                    d.body.velocity.set(Math.random() * 10 - 5, 12, Math.random() * 10 - 5);
                    d.body.angularVelocity.set(Math.random() * 20, Math.random() * 20, Math.random() * 20);
                });

                // Ждем пока физика "уснет" (кубики остановятся)
                setTimeout(() => this.calculatePhysicsResult(), 2500);
            }

            calculatePhysicsResult() {
                let total = 0;
                const up = new THREE.Vector3(0, 1, 0);

                this.dice.forEach(d => {
                    if (d.type === 'd6') {
                        // Математика для D6 (Box)
                        const normals = [
                            { v: new THREE.Vector3(1, 0, 0), val: 4 },
                            { v: new THREE.Vector3(-1, 0, 0), val: 3 },
                            { v: new THREE.Vector3(0, 1, 0), val: 1 },
                            { v: new THREE.Vector3(0, -1, 0), val: 6 },
                            { v: new THREE.Vector3(0, 0, 1), val: 2 },
                            { v: new THREE.Vector3(0, 0, -1), val: 5 }
                        ];
                        
                        let maxDot = -1;
                        let result = 1;

                        normals.forEach(n => {
                            // Трансформируем локальную нормаль грани в мировые координаты
                            const worldNormal = n.v.clone().applyQuaternion(d.mesh.quaternion);
                            const dot = worldNormal.dot(up); // Насколько грань смотрит вверх
                            if (dot > maxDot) {
                                maxDot = dot;
                                result = n.val;
                            }
                        });
                        total += result;
                    } else {
                        // Для D20 пока оставим рандом, так как нужно прописать 20 векторов
                        total += Math.floor(Math.random() * 20) + 1;
                    }
                });

                document.getElementById('total-sum').innerText = total;
                this.isRolling = false;
                this.tg.HapticFeedback.notificationOccurred('success');
            }

            clear() {
                this.dice.forEach(d => {
                    this.scene.remove(d.mesh);
                    this.world.removeBody(d.body);
                });
                this.dice = [];
                document.getElementById('total-sum').innerText = "0";
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.world.fixedStep();
                this.dice.forEach(d => {
                    d.mesh.position.copy(d.body.position);
                    d.mesh.quaternion.copy(d.body.quaternion);
                });
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.diceApp = new DiceApp();
    </script>
</body>
</html>
